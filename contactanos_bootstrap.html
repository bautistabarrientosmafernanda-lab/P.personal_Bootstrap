<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos de contacto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Krub:wght@400;700&family=Lilita+One&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css_bootstrap.css">
</head>
<body>

    <header class="py-3">
        <h1 class="titulo">Tienda patitas 🐾</h1>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <form class="formulario sombra p-4">
                    <fieldset class="border-0">
                        <legend class="text-center mb-4" style="font-family: 'Lilita One', sans-serif; font-size: 2.8rem;">
                            Contáctanos llenando todos los campos
                        </legend>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold" style="font-size: 1.8rem;">Nombre</label>
                            <input class="form-control input-text" type="text" placeholder="Escribe tu nombre">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold" style="font-size: 1.8rem;">Teléfono</label>
                            <input class="form-control input-text" type="tel" placeholder="Escribe tu teléfono">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold" style="font-size: 1.8rem;">Correo</label>
                            <input class="form-control input-text" type="email" placeholder="Escribe tu email">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold" style="font-size: 1.8rem;">Mensaje</label>
                            <textarea class="form-control input-text" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
                        </div>

                        <div class="text-center">
                            <input class="boton w-100" type="submit" value="Enviar">
                        </div>
                    </fieldset>
                </form>
            </div>
        </div>
    </main>

    <footer class="text-center py-4">
        <p class="m-0">Todos los derechos reservados. Maria Fernanda Bautista Barrientos</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
